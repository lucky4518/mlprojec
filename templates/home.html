<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Indicator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .login h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        legend {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #444;
            margin-bottom: 20px;
        }

        .mb-3 {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.5);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4facfe, #00c6fb);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: linear-gradient(135deg, #00c6fb, #4facfe);
            transform: scale(1.02);
        }

        h2 {
            margin-top: 20px;
            text-align: center;
            color: #222;
            background: #f3f8ff;
            padding: 15px;
            border-radius: 10px;
        }

        @media(max-width: 768px) {
            .login {
                padding: 20px;
            }

            legend {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="login">

        <h1>Student Exam Performance Indicator</h1>

        <form action="{{ url_for('predict_datapoint')}}" method="post">

            <legend>Student Exam Performance Prediction</legend>

            <div class="mb-3">
                <label class="form-label">Gender</label>

                <select class="form-control" name="gender" required>
                    <option selected disabled value="">Select your Gender</option>

                    <option value="male">Male</option>

                    <option value="female">Female</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Race or Ethnicity</label>

                <select class="form-control" name="ethnicity" required>
                    <option selected disabled value="">Select Ethnicity</option>

                    <option value="group A">Group A</option>

                    <option value="group B">Group B</option>

                    <option value="group C">Group C</option>

                    <option value="group D">Group D</option>

                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Parental Level of Education</label>

                <select class="form-control" name="parental_level_of_education" required>

                    <option selected disabled value="">Select Parent Education</option>

                    <option value="associate's degree">Associate's degree</option>

                    <option value="bachelor's degree">Bachelor's degree</option>

                    <option value="high school">High school</option>

                    <option value="master's degree">Master's degree</option>

                    <option value="some college">Some college</option>

                    <option value="some high school">Some high school</option>

                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Lunch Type</label>

                <select class="form-control" name="lunch" required>

                    <option selected disabled value="">Select Lunch Type</option>

                    <option value="free/reduced">Free/Reduced</option>

                    <option value="standard">Standard</option>

                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Test Preparation Course</label>

                <select class="form-control" name="test_preparation_course" required>

                    <option selected disabled value="">Select Test Course</option>

                    <option value="none">None</option>

                    <option value="completed">Completed</option>

                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Reading Score out of 100</label>

                <input class="form-control"
                    type="number"
                    name="reading_score"
                    placeholder="Enter your Reading score"
                    min="0"
                    max="100"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Writing Score out of 100</label>

                <input class="form-control"
                    type="number"
                    name="writing_score"
                    placeholder="Enter your Writing score"
                    min="0"
                    max="100"
                    required>
            </div>

            <div class="mb-3">
                <input class="btn btn-primary"
                    type="submit"
                    value="Predict your Maths Score">
            </div>

        </form>

        <h2>
            The Prediction is {{results}}
        </h2>

    </div>

</body>

</html>
